<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Post</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 1280px;
            height: 1280px;
            overflow: hidden;
        }

        body {
            margin: 0;
        }

        .post {
            padding: 54px;
            gap: 32px;
            display: flex;
            height: 100%;
            min-height: 0;
            max-width: 100%;
            background: url("./assets/post/background.png");
            flex-direction: column;
        }

        #top-content {
            border-radius: 15px;
            background: linear-gradient(90deg,#00000050 0%,  #00000010 90%, #00000000 100%);
            width: 100%;
            flex-shrink: 0;
            align-items: center;
            padding: 12px 20px;
            display: flex;
            justify-content: space-between;
            font-family: sans-serif;
            font-weight: 500;
            font-size: 21px;
            color: white;
        }

        #logo {
            width: 82px;
            height: 99px;
            object-fit: contain;
        }

        #image {
            flex: 1 1 auto;
            min-height: 0;
            width: 100%;
            object-fit: cover;
        }

        #title {
            flex-shrink: 0;
            border-radius: 15px;
            padding: 12px 14px;
            background: #00000050;
            text-align: center;
            font-size: 38px;
            line-height: 1.25;
            font-family: sans-serif;
            color: #ddfff4;
            max-width: 100%;
        }

    </style>
</head>
<body>
    <div class="post">
        <div id="top-content">
            <span>t.me/saibersport</span>
            <img id="logo" src="./assets/post/logo.png" alt="logo" />
        </div>

        <img id="image" src="https://dota2.ru/img/news/t1688796986.webp" alt="">

        <span id="title">Lorem ipsum dolor sit amet</span>
    </div>
</body>
</html>
