# Запуск: docker compose up -d --build
# Логи:   docker compose logs -f bot
#
# Сервис `bot` использует network_mode: host (Linux), чтобы исходящий трафик шёл как у хоста
# (часто нужно, если из bridge-сети Docker до api.telegram.org таймаут, а с хоста curl — ок).
# Postgres остаётся в обычной сети с пробросом порта на localhost; бот подключается к БД по 127.0.0.1.
#
# На Docker Desktop (Mac/Windows) host network работает иначе — при необходимости уберите
# network_mode и верните DATABASE_URL с хостом `db` + настройте IPv6 для Docker.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contentbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contentbot}
      POSTGRES_DB: ${POSTGRES_DB:-contentbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentbot} -d ${POSTGRES_DB:-contentbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: prod
      # Через host network имя `db` недоступно — только localhost и опубликованный порт Postgres.
      DATABASE_URL: postgresql://${POSTGRES_USER:-contentbot}:${POSTGRES_PASSWORD:-contentbot}@127.0.0.1:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-contentbot}
      MODE: ${MODE:-polling}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-content_bot}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}

volumes:
  pgdata:
