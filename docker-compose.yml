# Бот и Postgres в одной сети: хост БД в DATABASE_URL — всегда `db` (имя сервиса ниже).
# Переменные из `.env` подхватываются через env_file; DATABASE_URL здесь переопределяет
# значение из `.env`, если там указан localhost — иначе контейнер бота не достучится до Postgres.
#
# Запуск из каталога с проектом: docker compose up -d --build
# Логи бота:                      docker compose logs -f bot
#
# Если из контейнера таймаут до api.telegram.org, а с хоста curl работает — сеть Docker/IPv4/IPv6
# на стороне VPS; это не лечится этим файлом (см. документацию Docker IPv6 или прокси).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-contentbot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-contentbot}
      POSTGRES_DB: ${POSTGRES_DB:-contentbot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-contentbot} -d ${POSTGRES_DB:-contentbot}"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: prod
      # Обязательно хост `db`, не localhost (имя сервиса в этой compose-сети).
      DATABASE_URL: postgresql://${POSTGRES_USER:-contentbot}:${POSTGRES_PASSWORD:-contentbot}@db:5432/${POSTGRES_DB:-contentbot}
      MODE: ${MODE:-polling}
      DATABASE_SCHEMA: ${DATABASE_SCHEMA:-content_bot}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}

volumes:
  pgdata:
