<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post alt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 1280px;
            height: 1280px;
            overflow: hidden;
        }

        .post {
            position: relative;
            width: 100%;
            height: 100%;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        #image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        .scrim {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background:
                linear-gradient(180deg, rgba(5, 12, 20, 0.72) 0%, rgba(5, 12, 20, 0.15) 38%, transparent 55%),
                linear-gradient(0deg, rgba(5, 12, 20, 0.88) 0%, rgba(5, 12, 20, 0.35) 42%, transparent 65%);
        }

        .ui {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 44px 48px 56px;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        #logo {
            width: 68px;
            height: 82px;
            object-fit: contain;
            flex-shrink: 0;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.45));
        }

        /* Кнопка в духе Telegram: градиент, мягкая тень, иконка + подпись */
        .tg-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 14px 22px 14px 18px;
            border-radius: 999px;
            background: linear-gradient(135deg, #2aabee 0%, #229ed9 45%, #1c8fc9 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow:
                0 4px 14px rgba(34, 158, 217, 0.45),
                0 2px 6px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.22);
        }

        .tg-button__mark {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            display: block;
            filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.2));
        }

        .tg-button__text {
            font-size: 20px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: 0.02em;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
            white-space: nowrap;
        }

        .bottom {
            display: flex;
            flex-direction: column;
            gap: 18px;
            max-width: 100%;
        }

        #title {
            display: block;
            font-size: 38px;
            line-height: 1.28;
            font-weight: 800;
            color: #f8fafc;
            text-shadow:
                0 2px 8px rgba(0, 0, 0, 0.85),
                0 0 1px rgba(0, 0, 0, 1);
            hyphens: auto;
            word-wrap: break-word;
            overflow-wrap: break-word;
        }

    </style>
</head>
<body>
    <div class="post">
        <img id="image" src="https://dota2.ru/img/news/t1688796986.webp" alt="">
        <div class="scrim" aria-hidden="true"></div>
        <div class="ui">
            <div class="topbar">
                <img id="logo" src="./assets/post/logo.png" alt="" />
                <div class="tg-button" role="presentation">
                    <svg class="tg-button__mark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#fff" aria-hidden="true">
                        <path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.248-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/>
                    </svg>
                    <span class="tg-button__text">t.me/saibersport</span>
                </div>
            </div>
            <div class="bottom">
                <span id="title">Lorem ipsum dolor sit amet</span>
            </div>
        </div>
    </div>
</body>
</html>
